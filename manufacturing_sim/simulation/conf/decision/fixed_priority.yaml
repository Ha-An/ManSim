# 규칙 기반 고정 우선순위 베이스라인
# - candidate-task 생성 로직은 adaptive_priority와 같지만 task-family weight는 바꾸지 않는다.
# - quota와 일부 norm은 여전히 planning에 반영될 수 있다.
mode: fixed_priority
fixed_task_priority: true

# breakdown / discharge 같은 긴급 이벤트 대응 on/off
urgent_discuss:
  enabled: true

# shared norm을 planning에 반영할지 여부
norms:
  enabled: true

llm:
  enabled: false
  provider: openai_compatible
  server_url: "http://localhost:8000/v1"
  model: ""
  timeout_sec: 30
  temperature: 0.2
