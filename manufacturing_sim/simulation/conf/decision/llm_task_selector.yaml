# 하이브리드 LLM selector 모드
# - 엔진이 hard constraint와 feasible candidate 생성을 처리한다.
# - feasible candidate가 여러 개일 때 LLM이 next task를 고른다.
mode: llm_task_selector

# breakdown / discharge 같은 긴급 이벤트 대응 on/off
urgent_discuss:
  enabled: true

llm:
  enabled: true
  provider: openai_compatible
  server_url: "http://localhost:11434/v1"
  model: "qwen2.5:14b"
  timeout_sec: 120
  temperature: 0.0
  max_tokens: 800

  communication:
    # GovSim-style townhall 대화 on/off
    enabled: true
    # townhall 자연어 발언 언어: KOR 또는 ENG
    language: KOR
    rounds: 3
    # 각 발화에서 transcript context로 유지할 최근 메시지 수
    max_transcript_messages: 24

  memory:
    # discussion memory에 유지할 최근 day 수
    history_window_days: 7
    # per-agent memory snippet을 프롬프트에 포함할지 여부
    include_agent_memory: true

  task_selector:
    # 0이면 feasible candidate 전체를 사용한다.
    max_candidates: 0
    # true면 엔진 score hint를 candidate와 함께 전달한다.
    include_score_hints: false

