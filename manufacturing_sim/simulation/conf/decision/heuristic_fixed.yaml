# Backward-compatible alias for `decision=fixed_priority`.
# Prefer the new name in docs and new configs, but keep this alias so old
# commands and saved Hydra overrides continue to run unchanged.
mode: heuristic_fixed
fixed_task_priority: true

llm:
  enabled: false
  provider: openai_compatible
  server_url: "http://localhost:8000/v1"
  model: ""
  timeout_sec: 30
  temperature: 0.2
