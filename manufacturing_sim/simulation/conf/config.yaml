# ManSim root config (Hydra)
defaults:
  - experiment: mfg_basic
  # Decision presets:
  # - adaptive_priority: rule-based with adaptive priorities
  # - fixed_priority: rule-based with fixed task weights
  # - llm_planner: OpenClaw + Gemma 4 E4B Docker runtime 기반 기본 preset
  # - llm_planner_qwen_legacy: 기존 WSL Qwen vLLM runtime을 유지하는 legacy preset
  - decision: llm_planner
  - heuristic_rules: default
  - _self_

run_name: manufacturing_sim
seed: 2026

ui:
  auto_open_results: true
  open_all_artifacts: false
  open_artifacts:
    - kpi_dashboard.html
  auto_open_streamlit: false
  streamlit_preferred_port: 8505
  streamlit_port_range:
    start: 8505
    end: 8555

