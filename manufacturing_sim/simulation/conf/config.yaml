# Global root config for ManSim (Hydra).
defaults:
  # Experiment scenario (factory layout, timing, inventory, failures).
  - experiment: mfg_basic
  # Decision mode:
  # - adaptive_priority: rule-based mode with runtime priority adaptation
  # - fixed_priority: rule-based mode with fixed task priorities
  # - llm: LLM-based decision making
  # Backward-compatible aliases are still supported: heuristic, heuristic_fixed
  # Override example: decision=adaptive_priority / decision=fixed_priority / decision=llm
  - decision: llm
  # Shared rule set used by the rule-based modes and by parts of the world logic.
  - heuristic_rules: default
  # Keep values from this file after defaults merge.
  - _self_

# Run label for logs/metadata.
run_name: manufacturing_sim

# Random seed:
# - null: non-deterministic
# - integer: reproducible run
seed: 2026

ui:
  # Auto-open result artifacts after simulation ends.
  auto_open_results: true
  # If true, open all generated top-level artifacts in the output folder.
  # If false, only open artifacts listed under open_artifacts.
  open_all_artifacts: false
  # Used only when open_all_artifacts=false.
  open_artifacts:
    - kpi_dashboard.html
    - gantt.html
    - task_priority_dashboard.html
  # Auto-launch Streamlit replay UI.
  auto_open_streamlit: true
  # Preferred port (falls back to range if occupied).
  streamlit_preferred_port: 8505
  # Streamlit port scan range.
  streamlit_port_range:
    start: 8505
    end: 8555
