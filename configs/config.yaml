# ManSim vNext root config (Hydra)
# Override with `decision=...`, `scenario=...`, or dotted Hydra keys.
defaults:
  - scenario: mfg_basic
  # Decision modes:
  # - fixed_priority: fixed scripted baseline
  # - adaptive_priority: adaptive scripted baseline
  # - fixed_task_assignment: worker task-family allowlist mode
  # - llm_planner: legacy commitment-driven LLM mode
  # - openclaw_adaptive_priority: OpenClaw manager-only priority-driven LLM mode
  # - rolling_horizon_aging_priority: rolling task pool with waited-window priority aging
  # - rolling_horizon_dedicated_roles: rolling task pool with worker-specific HumanoidSim task roles
  - decision: rolling_horizon_dedicated_roles
  - heuristic_rules: default
  - humanoidsim: default
  - runtime: default
  - worker: default
  - _self_

# Global random seed. Scenario-specific seed overrides this when provided.
seed: 2026
