# OpenClaw manager-only LLM mode.
# Managers produce high-level operating intent. A deterministic compiler turns that
# intent into executable policy. Workers remain deterministic shop-floor executors.
mode: openclaw_adaptive_priority

llm:
  enabled: true
  provider: openclaw
  model: "vllm/mansim-gemma4-e4b"
  server_url: "http://localhost:18789/v1"
  api_key: "vllm-local"
  language: ENG
  timeout_sec: 120
  temperature: 0.0
  # If the backend supports request-level seed, reuse the simulation seed.
  seed: ${seed}
  max_tokens: 600

  openclaw:
    backend_health_probe_interval_sec: 30
    backend_health_probe_timeout_sec: 2.5
    runtime_recovery_probe_retries: 2
    runtime_recovery_restarts: 1
    runtime_recovery_backoff_sec: 1.5
    runtime_readiness_timeout_sec: 12.0
    profile_name: mansim_repo
    profile_config_path: "openclaw/profiles/mansim_repo/openclaw.json"
    session_namespace: mansim
    manager_agent_id: MANAGER
    workspace_root: openclaw/workspaces
    # Native thinking strength for OpenClaw manager turns.
    # Allowed examples: off, minimal, low, medium, high, adaptive.
    native_thinking: "off"
    # Worker ids exposed to the OpenClaw runtime. Empty means A1..An from factory.num_workers.
    worker_agent_ids:
      - A1
      - A2
      - A3
    backend:
      provider: vllm
      model: mansim-gemma4-e4b
      model_name: "Gemma 4 E4B IT"
      base_url: "http://127.0.0.1:8000/v1"
      wsl_distro: "Ubuntu-24.04"
      api: "openai-completions"
      api_key: "vllm-local"
      context_window: 32768
      max_output_tokens: 2048
      reasoning: false

  orchestration:
    # Manager orchestration switch.
    enabled: true
    # If run_count >= 2, runtime creates run_01, run_02... under a series directory.
    run_count: 1
    # When running a series, assign seed + (run_index - 1) * seed_stride to each run.
    # This keeps cross-run learning deterministic while making stochastic shop-floor
    # outcomes, such as inspection scrap, independent across runs.
    vary_seed_by_run: true
    seed_stride: 1
    sync_llm_seed_with_run_seed: true
    strategy:
      # Blend between scripted fallback weights and strategist intent.
      priority_blend_alpha: 0.45
      # Blend between scripted fallback agent multipliers and strategist role intent.
      agent_blend_alpha: 0.50
    review:
      # If false, use deterministic reviewer fallback instead of LLM reviewer.
      enabled: true
      # Keep reviewer output compact to avoid prompt bloat.
      max_prevention_targets: 2
      max_failure_modes: 3

  memory:
    # Number of recent days retained in run-local manager memory.
    history_window_days: 7

  knowledge:
    # LLM Wiki / Curator pipeline. Runtime resolves this path relative to repo root.
    enabled: true
    root: knowledge/llm_knowledge
    # auto creates knowledge/llm_knowledge/experiments/<hydra-run-id>/...
    # shared keeps all runs directly under root.
    experiment_scope: auto
    manager_usage:
      strategist: true
      reviewer: true
      curator: true
    curator:
      enabled: true
      update_frequency: daily
    graph:
      enabled: true
      provider: graphifyy
      # Use Graphify's OpenAI-compatible ollama backend against the local vLLM server.
      backend: ollama
      model: "mansim-gemma4-e4b"
      base_url: "http://127.0.0.1:8000/v1"
      api_key: "vllm-local"
      max_output_tokens: 4096
      no_cluster: true
      command: ""
      update_frequency: run
      timeout_sec: 900
