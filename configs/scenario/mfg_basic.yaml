# 기본 제조 실험 시나리오
name: mfg_basic

horizon:
  # 총 시뮬레이션 일수
  num_days: 5
  # 하루 길이(분). 240=4시간, 480=8시간, 1440=24시간
  minutes_per_day: 240

factory:
  # 이동 작업자 수
  num_workers: 3
  # Station1, Station2의 machine 수
  machines_per_station: 2

  # station별 processing 시간
  processing_time_min:
    station1: 20
    station2: 30

  # Inspection은 단일 worker만 점유할 수 있다.
  # 검사 시간은 base이며, inspection_min_time_min보다 짧아지지 않는다.
  inspection_base_time_min: 10
  inspection_min_time_min: 2

movement:
  # Warehouse <-> Station 이동 시간
  warehouse_to_station_min: 8
  # Station / Inspection 구역 간 기본 이동 시간
  station_to_station_min: 5
  # machine setup/load에 드는 시간
  setup_min: 3
  # machine unload에 드는 시간
  unload_min: 2
  # BatteryStation 이동 시간
  to_battery_station_min: 4
  # 그 외 기본 이동 시간
  default_min: 6
  # Carrying an item changes only the tile/edge travel time while the worker is loaded.
  # Material is the baseline. Intermediate and product are heavier.
  item_transport:
    weight_time_multiplier:
      material: 1.0
      intermediate: 1.5
      product: 2.0
      battery: 1.0
      battery_fresh: 1.0
      battery_spent: 1.0
    product_collaboration:
      enabled: true
      max_carriers: 2
      # A second carrier divides the remaining product movement time from the next tile segment.
      divide_time_by_carrier_count: true
  # Worker 동선 겹침과 충돌 가능 상황을 다루는 traffic model.
  # strict_reservation은 다음 tile을 예약하지 못하면 대기하고 TRAFFIC_WAIT을 기록한다.
  # observe_conflicts로 바꾸면 이동을 막지 않고 tile/edge conflict를 event와 Replay overlay로 남긴다.
  traffic:
    enabled: true
    mode: strict_reservation
    fidelity: tile_edge
    collision_effect: log_only
    near_miss_headway_min: 0.05
    emit_tile_step_events: true

map:
  # Tile 기반 공간 모델. false로 두면 기존 zone-name 이동시간 모델로 fallback한다.
  enabled: true
  width_tiles: 100
  height_tiles: 70
  tile_time_min: 0.1
  blocked_replan_threshold_min: 5.0

quality:
  # Inspection에서 scrap으로 판정될 확률(0~1)
  defect_prob: 0.10
  scrap_transport:
    # Inspection scrap queue에서 ScrapDisposal까지 한 번에 옮길 수 있는 불량품 수
    max_carry_count: 3

warehouse:
  material_shelf:
    # Warehouse 선반에 놓일 수 있는 material slot 수
    capacity: 10
    # 매 day boundary마다 빈 slot만 capacity까지 보충한다.
    restock_policy: day_boundary
    # 시뮬레이션 시작 시 채워둘 material 수
    initial_fill: 10

machine_failure:
  # 평균 고장 간격(분). exponential 분포 기반
  mean_time_to_fail_min: 300
  repair_time_min: 20
  max_repair_agents: 3
  pm_time_min: 30
  # PM 효과 지속 시간
  pm_effect_duration_min: 720
  # PM 효과 중 고장률 multiplier
  pm_lambda_multiplier: 0.5
  # PM이 due로 간주되는 목표 간격
  pm_interval_target_min: 480

worker:
  # 배터리 교체가 필요한 사용 주기(분)
  battery_swap_period_min: 200
  # fresh battery 픽업 시간
  battery_pickup_time_min: 5
  # 배터리 전달 작업의 추가 서비스 시간
  battery_delivery_extra_min: 4

inventory_targets:
  material:
    station1: 10
    station2: 10
  intermediate:
    # Station1은 raw material만 사용한다.
    # intermediate queue는 Station2 입력과 Inspection 입력에서만 의미가 있다.
    station2: 10
    station4: 10

# 시뮬레이션 시작 시 초기 queue fill 값
# 0으로 두면 빈 공장 상태에서 시작하되,
# inventory_targets는 실행 중 replenishment 목표로 계속 사용된다.
initial_inventory:
  material:
    station1: 0
    station2: 0

dispatcher:
  # urgent_discuss 연속 호출 최소 간격
  urgent_chat_cooldown_min: 5
  # minute snapshot 기록 간격
  snapshot_interval_min: 1
